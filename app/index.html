<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Photogenic — Editor</title>
    <link rel="stylesheet" href="./editor.css" />
  </head>
  <body>
    <div id="app">
      <!-- React mount point for TopBar (Task 3.1 — strangler-fig migration) -->
      <div id="react-root"></div>

      <div class="layout">
        <!-- Library sidebar -->
        <aside class="sidebar sidebar--library">
          <div id="react-library"></div>
        </aside>

        <!-- Center: preview -->
        <main class="preview-area">
          <div id="react-preview"></div>
        </main>

        <!-- Right: develop + export panels -->
        <aside class="sidebar sidebar--controls">
          <!-- Develop panel -->
          <section class="panel" id="develop-panel">
            <h2>Develop</h2>
            <div id="react-develop"></div>
            <div class="control-actions">
              <button id="btn-save-preset" class="btn btn--small">Save as Preset</button>
              <select id="preset-select" class="preset-select" disabled>
                <option value="">— Load Preset —</option>
              </select>
              <button id="btn-apply-preset" class="btn btn--small" disabled>Apply</button>
              <span id="recipe-revision" class="revision-display"></span>
            </div>
          </section>

          <!-- Batch Sync -->
          <section class="panel" id="batch-panel">
            <h2>Batch Sync</h2>
            <p class="hint">Sync selected operations to all visible images.</p>
            <div class="sync-types">
              <label><input type="checkbox" class="sync-type" value="exposure" checked /> Exposure</label>
              <label><input type="checkbox" class="sync-type" value="temperature" /> Temperature</label>
              <label><input type="checkbox" class="sync-type" value="contrast" /> Contrast</label>
            </div>
            <button id="btn-batch-sync" class="btn">Apply to All</button>
          </section>

          <!-- Export panel -->
          <section class="panel" id="export-panel">
            <h2>Export</h2>
            <div class="control-group">
              <label>Format</label>
              <select id="export-format">
                <option value="png">PNG (8-bit)</option>
                <option value="jpeg">JPEG</option>
                <option value="tiff-8">TIFF (8-bit)</option>
                <option value="tiff-16">TIFF (16-bit)</option>
              </select>
            </div>
            <div class="control-group">
              <label>Quality</label>
              <input type="range" id="export-quality" min="1" max="100" step="1" value="92" />
              <span class="value-display" id="val-quality">92</span>
            </div>
            <button id="btn-export" class="btn btn--primary">Queue Export</button>
            <div id="export-jobs" class="job-list"></div>
          </section>
        </aside>
      </div>

      <!-- Status bar -->
      <footer class="status-bar">
        <span id="status-text">Ready.</span>
        <span id="viewport-status" class="status-hint">Viewport proof: provisional</span>
      </footer>
    </div>

    <script type="module" src="/src/main.tsx"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
