<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Photogenic — Editor</title>
    <link rel="stylesheet" href="./editor.css" />
  </head>
  <body>
    <div id="app">
      <!-- React mount point for TopBar (Task 3.1 — strangler-fig migration) -->
      <div id="react-root"></div>

      <div class="layout">
        <!-- Library sidebar -->
        <aside class="sidebar sidebar--library">
          <div class="sidebar-header">
            <h2>Library</h2>
            <button id="btn-import" class="btn btn--small" title="Import sources">+ Import</button>
          </div>
          <div id="library-grid" class="library-grid">
            <p class="empty-state">No images imported yet.</p>
          </div>
        </aside>

        <!-- Center: preview -->
        <main class="preview-area">
          <div id="preview-empty" class="empty-state">Select an image to begin.</div>
          <canvas id="preview-canvas" style="display:none;"></canvas>
          <div id="preview-provenance" class="provenance-bar" style="display:none;"></div>
        </main>

        <!-- Right: develop + export panels -->
        <aside class="sidebar sidebar--controls">
          <!-- Develop panel -->
          <section class="panel" id="develop-panel">
            <h2>Develop</h2>
            <div class="control-group">
              <label>Exposure (EV)</label>
              <input type="range" id="ctrl-exposure" min="-3" max="3" step="0.1" value="0" />
              <span class="value-display" id="val-exposure">0.0</span>
            </div>
            <div class="control-group">
              <label>Temperature (KΔ)</label>
              <input type="range" id="ctrl-temperature" min="-2000" max="2000" step="50" value="0" />
              <span class="value-display" id="val-temperature">0</span>
            </div>
            <div class="control-group">
              <label>Tint</label>
              <input type="range" id="ctrl-tint" min="-50" max="50" step="1" value="0" />
              <span class="value-display" id="val-tint">0</span>
            </div>
            <div class="control-group">
              <label>Contrast</label>
              <input type="range" id="ctrl-contrast" min="-100" max="100" step="1" value="0" />
              <span class="value-display" id="val-contrast">0</span>
            </div>
            <div class="control-group">
              <label>Highlights</label>
              <input type="range" id="ctrl-highlights" min="-100" max="100" step="1" value="0" />
              <span class="value-display" id="val-highlights">0</span>
            </div>
            <div class="control-group">
              <label>Shadows</label>
              <input type="range" id="ctrl-shadows" min="-100" max="100" step="1" value="0" />
              <span class="value-display" id="val-shadows">0</span>
            </div>
            <div class="control-group">
              <label>Whites</label>
              <input type="range" id="ctrl-whites" min="-100" max="100" step="1" value="0" />
              <span class="value-display" id="val-whites">0</span>
            </div>
            <div class="control-group">
              <label>Blacks</label>
              <input type="range" id="ctrl-blacks" min="-100" max="100" step="1" value="0" />
              <span class="value-display" id="val-blacks">0</span>
            </div>
            <div class="control-group">
              <label>Tone Curve (Midpoint)</label>
              <input type="range" id="ctrl-toneCurve" min="-100" max="100" step="1" value="0" />
              <span class="value-display" id="val-toneCurve">0</span>
            </div>
            <details class="control-group">
              <summary style="font-size:0.8rem;cursor:pointer;color:var(--text-dim);">HSL (Red Channel)</summary>
              <div style="margin-top:6px;">
                <label>Hue</label>
                <input type="range" id="ctrl-hsl-hue" min="-180" max="180" step="1" value="0" />
                <span class="value-display" id="val-hsl-hue">0</span>
              </div>
              <div>
                <label>Saturation</label>
                <input type="range" id="ctrl-hsl-sat" min="-100" max="100" step="1" value="0" />
                <span class="value-display" id="val-hsl-sat">0</span>
              </div>
              <div>
                <label>Luminance</label>
                <input type="range" id="ctrl-hsl-lum" min="-100" max="100" step="1" value="0" />
                <span class="value-display" id="val-hsl-lum">0</span>
              </div>
            </details>
            <details class="control-group">
              <summary style="font-size:0.8rem;cursor:pointer;color:var(--text-dim);">Crop / Rotate / Straighten</summary>
              <div style="margin-top:6px;">
                <label>Crop X</label>
                <input type="range" id="ctrl-crop-x" min="0" max="1" step="0.01" value="0" />
                <label>Crop Y</label>
                <input type="range" id="ctrl-crop-y" min="0" max="1" step="0.01" value="0" />
                <label>Crop W</label>
                <input type="range" id="ctrl-crop-w" min="0.01" max="1" step="0.01" value="1" />
                <label>Crop H</label>
                <input type="range" id="ctrl-crop-h" min="0.01" max="1" step="0.01" value="1" />
              </div>
              <div style="margin-top:6px;">
                <label>Rotate</label>
                <select id="ctrl-rotate">
                  <option value="0">0°</option>
                  <option value="90">90°</option>
                  <option value="180">180°</option>
                  <option value="270">270°</option>
                </select>
              </div>
              <div style="margin-top:6px;">
                <label>Straighten (°)</label>
                <input type="range" id="ctrl-straighten" min="-45" max="45" step="0.1" value="0" />
                <span class="value-display" id="val-straighten">0.0</span>
              </div>
            </details>
            <div class="control-group">
              <label>Sharpening</label>
              <input type="range" id="ctrl-sharpen" min="0" max="100" step="1" value="0" />
              <span class="value-display" id="val-sharpen">0</span>
            </div>
            <div class="control-group">
              <label>Noise Reduction</label>
              <input type="range" id="ctrl-noise" min="0" max="100" step="1" value="0" />
              <span class="value-display" id="val-noise">0</span>
            </div>
            <div class="control-actions">
              <button id="btn-save-preset" class="btn btn--small">Save as Preset</button>
              <select id="preset-select" class="preset-select" disabled>
                <option value="">— Load Preset —</option>
              </select>
              <button id="btn-apply-preset" class="btn btn--small" disabled>Apply</button>
              <span id="recipe-revision" class="revision-display"></span>
            </div>
          </section>

          <!-- Batch Sync -->
          <section class="panel" id="batch-panel">
            <h2>Batch Sync</h2>
            <p class="hint">Sync selected operations to all visible images.</p>
            <div class="sync-types">
              <label><input type="checkbox" class="sync-type" value="exposure" checked /> Exposure</label>
              <label><input type="checkbox" class="sync-type" value="temperature" /> Temperature</label>
              <label><input type="checkbox" class="sync-type" value="contrast" /> Contrast</label>
            </div>
            <button id="btn-batch-sync" class="btn">Apply to All</button>
          </section>

          <!-- Export panel -->
          <section class="panel" id="export-panel">
            <h2>Export</h2>
            <div class="control-group">
              <label>Format</label>
              <select id="export-format">
                <option value="png">PNG (8-bit)</option>
                <option value="jpeg">JPEG</option>
                <option value="tiff-8">TIFF (8-bit)</option>
                <option value="tiff-16">TIFF (16-bit)</option>
              </select>
            </div>
            <div class="control-group">
              <label>Quality</label>
              <input type="range" id="export-quality" min="1" max="100" step="1" value="92" />
              <span class="value-display" id="val-quality">92</span>
            </div>
            <button id="btn-export" class="btn btn--primary">Queue Export</button>
            <div id="export-jobs" class="job-list"></div>
          </section>
        </aside>
      </div>

      <!-- Status bar -->
      <footer class="status-bar">
        <span id="status-text">Ready.</span>
        <span id="viewport-status" class="status-hint">Viewport proof: provisional</span>
      </footer>
    </div>

    <script type="module" src="/src/main.tsx"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
