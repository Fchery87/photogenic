<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Photogenic — Editor</title>
    <link rel="stylesheet" href="./editor.css" />
  </head>
  <body>
    <div id="app">
      <!-- React mount point for TopBar (Task 3.1 — strangler-fig migration) -->
      <div id="react-root"></div>

      <div class="layout">
        <!-- Library sidebar -->
        <aside class="sidebar sidebar--library">
          <div id="react-library"></div>
        </aside>

        <!-- Center: preview -->
        <main class="preview-area">
          <div id="react-preview"></div>
        </main>

        <!-- Right: develop + export panels -->
        <aside class="sidebar sidebar--controls">
          <!-- Develop panel -->
          <section class="panel" id="develop-panel">
            <h2>Develop</h2>
            <div id="react-develop"></div>
            <div id="react-preset"></div>
          </section>

          <!-- Batch Sync -->
          <div id="react-batch"></div>

          <!-- Export -->
          <div id="react-export"></div>
        </aside>
      </div>

      <!-- Status bar -->
      <footer class="status-bar">
        <span id="status-text">Ready.</span>
        <span id="viewport-status" class="status-hint">Viewport proof: provisional</span>
      </footer>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
